name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Read version and parse release note
        id: meta
        shell: bash
        run: |
          python << 'PYEOF'
          import re, os, yaml, sys

          gout = os.environ.get('GITHUB_OUTPUT', '')
          def setout(key, val):
              if gout:
                  with open(gout, 'a', encoding='utf-8') as f:
                      f.write(f'{key}={val}\n')
              else:
                  print(f'{key}={val}')

          # Read version from config.py
          with open('config.py', encoding='utf-8') as f:
              m = re.search(r'CURRENT_VERSION\s*=\s*["\'](.+?)["\']', f.read())
          version = m.group(1) if m else '0.0.0.0'
          setout('version', version)

          # Parse release note
          note_file = f'docs/v{version}.md'
          if not os.path.exists(note_file):
              setout('publish', 'false')
              print(f'::notice::No release note at {note_file}, skipping release.')
              sys.exit(0)

          with open(note_file, encoding='utf-8') as f:
              content = f.read()

          if content.startswith('---'):
              parts = content.split('---', 2)
              if len(parts) >= 3:
                  meta = yaml.safe_load(parts[1])
                  body = parts[2].strip()
                  publish = meta.get('publish', True)
                  prerelease = meta.get('prerelease', False)
                  setout('publish', str(publish).lower())
                  setout('prerelease', str(prerelease).lower())
                  with open('release_body.md', 'w', encoding='utf-8') as bf:
                      bf.write(body)
                  sys.exit(0)

          setout('publish', 'false')
          print(f'::notice::No valid frontmatter in {note_file}.')
          PYEOF

      - name: Build Steam version (FH6Auto.exe)
        run: |
          python -m PyInstaller -n "FH6Auto" -F -w --uac-admin --noupx main.py `
            --icon=assets/icon.ico `
            --add-data "images;images" `
            --add-data "assets;assets" `
            --add-data "onnx_models;onnx_models" `
            --hidden-import yaml `
            --hidden-import onnxruntime `
            --noconfirm

      - name: Build Xbox version (FH6Auto_xbox.exe)
        shell: pwsh
        run: |
          # Backup steam files
          Copy-Item input_handler.py input_handler_steam_bak.py -Force
          Copy-Item race_logic.py race_logic_steam_bak.py -Force
          # Swap in xbox files
          Copy-Item input_handler_xbox.py input_handler.py -Force
          Copy-Item race_logic_xbox.py race_logic.py -Force
          # Build
          python -m PyInstaller -n "FH6Auto_xbox" -F -w --uac-admin --noupx main.py `
            --icon=assets/icon.ico `
            --add-data "images;images" `
            --add-data "assets;assets" `
            --add-data "onnx_models;onnx_models" `
            --hidden-import yaml `
            --hidden-import onnxruntime `
            --noconfirm
          # Restore steam files
          Copy-Item input_handler_steam_bak.py input_handler.py -Force
          Copy-Item race_logic_steam_bak.py race_logic.py -Force
          Remove-Item input_handler_steam_bak.py, race_logic_steam_bak.py -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FH6Auto-binaries
          path: |
            dist/FH6Auto.exe
            dist/FH6Auto_xbox.exe

      - name: Create GitHub Release
        if: steps.meta.outputs.publish == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          TAG="v${VERSION}"
          PRERELEASE="${{ steps.meta.outputs.prerelease }}"
          ARGS=""
          if [ "$PRERELEASE" = "true" ]; then
            ARGS="--prerelease"
          fi
          gh release create "$TAG" \
            dist/FH6Auto.exe \
            dist/FH6Auto_xbox.exe \
            --title "v$VERSION" \
            --notes-file release_body.md \
            $ARGS \
            --target main
