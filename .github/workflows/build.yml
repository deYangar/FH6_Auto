name: Build FH6Auto EXE

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'main.py'
      - 'requirements.txt'
      - 'images/**'
      - 'assets/**'
      - 'version.json'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller -n "FH6Auto" -F -w --uac-admin --icon=assets/icon.ico --add-data "images;images" --add-data "assets;assets" main.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: FH6Auto
          path: dist/FH6Auto.exe
          retention-days: 30
